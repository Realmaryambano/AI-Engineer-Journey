<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 2</title>
    <style>
        div p {
            color: white;
            background-color: blue;
        }

        p:first-child {
            color: red;
            background-color: yellow;
        }
    </style>
</head>

<body>

    <!-- Challenge:
    Write HTML and CSS code to style a paragraph inside a div that contains 5 paragraphs.
    The first paragraph should have a yellow background and red text.
    The remaining paragraphs should have a blue background and white text.
    Do not change the HTML below.
    -->

    <div>
        <p>First paragraph</p>
        <p>Second paragraph</p>
        <p>Third paragraph</p>
        <p>Fourth paragraph</p>
        <p>Fifth paragraph</p>
    </div>

</body>

</html>
