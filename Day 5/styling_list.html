<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Lists</title>
    <style>
        nav ul li{
            list-style:arabic-indic ;
            background-color: yellow;
            border: 2px solid black;
            /* isey jo 1,2,3,4 likha haina wo bhi list k andr hi include hoga ab */
            list-style-position: inside; 

        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Career</li>
            <li>Contact</li>


        </ul>
    </nav>
</body>
</html>
