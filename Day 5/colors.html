<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colors</title>
    <style>
        .hsl{
            font-weight: bolder;
            color: hsl(155, 62%, 32%);
        }
        .rgb{
            color: rgb(116, 89, 197);
            font-weight: 1000;
        }
        .hex {
            color: #e630d9;
            font-weight: bolder;
        }

        .ck {
            color: chartreuse;
            border: 2px solid blue;
        }
        .rgba{
            color: rgba(255, 77, 0, 0.936);
        }

        li {
            list-style: inside;
            list-style-type: decimal;

        }
    </style>
</head>

<body>
    <h1>lets learn about colors</h1>
    <p>Colors can be represented in
    <ol>
        <li class="ck">Color Keywords</li>
        <li class="hex">Hex Color Code</li>
        <li class="rgb">RGB</li>
        <li class="rgba">RGBA</li>
        <li class="hsl">HSL</li>
    </ol>
    </p>
</body>

</html>
