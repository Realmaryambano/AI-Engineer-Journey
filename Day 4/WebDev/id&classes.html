<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Id and classes</title>
</head>
<body>
    <h1 id="welcome" class="bg hello-hi bye">Hello World</h1>
    <h3>Python is <span class="abc">orange.</span></h3>
    <p class="bye">Lorem ipsum dolor sit amet consectetur adipisicing elit. Consectetur, obcaecati?</p>
    <a href="https://www.google.com" target="_blank">Link to <span class="abc">Google</span></a>


<h1 id="welcome1">Welcome</h1>

<p class="abc1">Paragraph 1</p>

<p class="blue">Paragraph 2</p>

<h2 id="hello">Hello</h2>
</body>
</html>
