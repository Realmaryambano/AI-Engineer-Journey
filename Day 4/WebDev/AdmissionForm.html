<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission form</title>
</head>
<body>
    <h1>Admission Form</h1>
    <form>

    <label>Name:</label>
    <input type="text" placeholder="Enter your name"><br><br>

    <label>Email:</label>
    <input type="email" placeholder="Enter your email"><br><br>

    <label>Password:</label>
    <input type="password" placeholder="Enter your password"><br><br>

    <label>Age:</label>
    <input type="number" min="1" max="100"><br><br>

    <label>Date of Birth:</label>
    <input type="date"><br><br>

    <label>Time:</label>
    <input type="time"><br><br>

    <label>Phone:</label>
    <input type="tel" placeholder="03XX-XXXXXXX" autofocus><br><br>

    <label>Website:</label>
    <input type="url" placeholder="https://example.com"><br><br>

    <label>Favorite Color:</label>
    <input type="color"><br><br>

    <label>Experience:</label>
    <input type="range" min="0" max="10"><br><br>

    <label>Gender:</label>
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female<br><br>

    <label>Skills:</label>
    <input type="checkbox"> HTML
    <input type="checkbox"> CSS
    <input type="checkbox"> JavaScript<br><br>

    <label>Country:</label>
    <select>
        <option>Pakistan</option>
        <option>Turkey</option>
        <option>Saudi Arabia</option>
    </select><br><br>

    <label>Upload Resume:</label>
    <input type="file"><br><br>

    <label>About Yourself:</label><br>
    <textarea rows="4" cols="30" placeholder="Write something..."></textarea><br><br>

    <input type="reset" value="Reset">
    <input type="submit" value="Submit">

</form>

</body>
</html>>
