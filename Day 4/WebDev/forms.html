<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Submission form</h1>
    <form method="post">
        <div>
            <label for="username">Enter your username: </label>
            <input type="text" name="username" id="username" placeholder="example: alisha56">
        </div>
        
        <div>
            <label for="email">Enter your email:</label>
            <input type="email" id="email" name="email" placeholder="example: ali@gmail.com">
        </div>

        <div>
            <label for="password">Enter your password: </label>
            <input type="password" id="password" name="password" placeholder="abc1A_1">
        </div>

        <div>
            <label>Select your gender:</label>

            <input type="radio" name="gender" id="male" value="male">
            <label for="male">Male</label>

            <input type="radio" name="gender" id="female" value="female">
            <label for="female">Female</label>

            <input type="radio" name="gender" id="Other" value="Other">
            <label for="Other">Other</label>


        </div>
    </form>
</body>
</html>
