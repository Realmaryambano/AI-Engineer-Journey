<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Submission form</h1>
    <form method="post">
        <div>
            <label for="username">Enter your username: </label>
            <input type="text" name="username" id="username" placeholder="example: alisha56">
        </div>
        
        <div>
            <label for="email">Enter your email:</label>
            <input type="email" id="email" name="email" placeholder="example: ali@gmail.com">
        </div>

        <div>
            <label for="password">Enter your password: </label>
            <input type="password" id="password" name="password" placeholder="abc1A_1">
        </div>

        <div>
            <label>Select your gender:</label>

            <input type="radio" name="gender" id="male" value="male">
            <label for="male">Male</label>

            <input type="radio" name="gender" id="female" value="female">
            <label for="female">Female</label>

            <input type="radio" name="gender" id="Other" value="Other">
            <label for="Other">Other</label>

        </div>
        <div>
            <label for="notifications">Subscribe to newsletter</label>
            <input type="checkbox" name="notifications" id="notifications" value="yes">
        </div>

        <div>
            <label for="comment">Enter your comment:</label>
            <br>
            <textarea name="comment" id="comment" cols="30" rows="10"></textarea>
        </div>

        <div>
            <label for="field">Select your field:</label>
            <select name="field" id="field">
                <option value="cs">Bachelor in computer science</option>
                <option value="ee">Bachelor in electrical engineering</option>
                <option value="lit">Bachelor in english literature</option>
                <option value="psy">Bachelor in psychology</option>
                <option value="maths">Bachelor in mathematics</option>
            </select>
        </div>

        <div>
            <label for="country">Selct your country</label>
            <select name="country" id="country">
                <option value="pak">Pakistan</option>
                <option value="ind">India</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div>
            <label for="number">Enter your favourite number:</label>
            <input type="number" name="number" id="number">
        </div>

        <div>
            <label for="dob">Enter your date of birth: </label>
            <input type="date" name="dob" id="dob">
        </div>
        <div>
            <label for="tob">Enter your birth time: </label>
            <input type="time" name="tob" id="tob">
        </div>

        <div>
            <label for="docx">Upload your birth certificate: </label>
            <input type="file" name="docx" id="docx">
        </div>

        <div>
            <label for="color">Choose your favourite color</label>
            <input type="color" name="color" id="color">
        </div>
        <div>
            <label for="submit">Click to submit:</label>
            <input type="submit" value="submit" id="submit">
        </div>
    </form>


</body>
</html>
